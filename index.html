<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matteo Martin Ingram</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:    #0f0f0f;
  --ink2:   #999;
  --ink3:   #ccc;
  --border: #ececec;
  --white:  #fff;
}

html, body {
  height: 100vh;
  overflow: hidden;
  background: var(--white);
  color: var(--ink);
}

.stage {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.55s cubic-bezier(0.77, 0, 0.175, 1);
  position: relative;
  z-index: 1;
}

.stage.pushed { transform: translateX(340px); }

.stage::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 72px 72px;
  opacity: 0.45;
  z-index: -1;
  pointer-events: none;
}

.name-wrap {
  text-align: center;
  cursor: pointer;
  user-select: none;
  padding: 48px;
}

.name {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: clamp(26px, 4.5vw, 56px);
  font-weight: 400;
  letter-spacing: 0.01em;
  color: var(--ink);
  transition: opacity 0.2s;
}

.name:hover { opacity: 0.45; }

.name-hint {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 300;
  color: var(--ink3);
  letter-spacing: 0.12em;
  margin-top: 20px;
  opacity: 0;
  transform: translateY(5px);
  transition: opacity 0.35s 0.15s, transform 0.35s 0.15s;
}

.name-wrap:hover .name-hint {
  opacity: 1;
  transform: translateY(0);
}

.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: 340px;
  height: 100vh;
  background: var(--white);
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: transform 0.55s cubic-bezier(0.77, 0, 0.175, 1);
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow: hidden;
}

.sidebar.open { transform: translateX(0); }

.sidebar-header {
  padding: 40px 36px 32px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-initials {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 15px;
  font-weight: 400;
  color: var(--ink2);
  letter-spacing: 0.06em;
}

.close-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--ink3);
  font-size: 16px;
  line-height: 1;
  font-family: 'DM Mono', monospace;
  transition: color 0.15s;
  padding: 4px;
}
.close-btn:hover { color: var(--ink); }

.nav-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0 32px;
}

.nav-list::-webkit-scrollbar { width: 0; }

.nav-section { padding: 28px 36px 0; }

.nav-section-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 300;
  color: var(--ink3);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.nav-item {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  gap: 12px;
  opacity: 0;
  transform: translateX(-8px);
  transition: opacity 0.3s, transform 0.3s, color 0.15s;
}

.sidebar.open .nav-item { opacity: 1; transform: translateX(0); }
.sidebar.open .nav-item:nth-child(1) { transition-delay: 0.07s; }
.sidebar.open .nav-item:nth-child(2) { transition-delay: 0.12s; }
.sidebar.open .nav-item:nth-child(3) { transition-delay: 0.17s; }
.sidebar.open .nav-item:nth-child(4) { transition-delay: 0.22s; }
.sidebar.open .nav-item:nth-child(5) { transition-delay: 0.27s; }
.sidebar.open .nav-item:nth-child(6) { transition-delay: 0.32s; }

.nav-item:last-child { border-bottom: none; }
.nav-item:hover { opacity: 0.4; }

.nav-item-title {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 20px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1;
}

.nav-item-arrow {
  font-size: 12px;
  color: var(--ink3);
  font-family: 'DM Mono', monospace;
  flex-shrink: 0;
  transition: transform 0.15s;
}

.nav-item:hover .nav-item-arrow { transform: translateX(2px); }

.sidebar-footer {
  padding: 20px 36px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  gap: 22px;
}

.footer-link {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 300;
  color: var(--ink3);
  text-decoration: none;
  letter-spacing: 0.07em;
  transition: color 0.15s;
}
.footer-link:hover { color: var(--ink); }

.overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
}
.overlay.active { pointer-events: auto; }

.year {
  position: fixed;
  bottom: 28px;
  right: 32px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 300;
  color: var(--ink3);
  letter-spacing: 0.08em;
  z-index: 2;
  transition: transform 0.55s cubic-bezier(0.77, 0, 0.175, 1);
}
.year.pushed { transform: translateX(340px); }
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-initials">MMI</div>
    <button class="close-btn" id="closeBtn" aria-label="close">&#x2715;</button>
  </div>

  <div class="nav-list">

    <div class="nav-section">
      <div class="nav-section-label">Simulation</div>

      <a class="nav-item" href="page1.html">
        <div class="nav-item-title">Double Pendulum</div>
        <div class="nav-item-arrow">&#x2192;</div>
      </a>

      <a class="nav-item" href="page2.html">
        <div class="nav-item-title">Polymarket Hedging</div>
        <div class="nav-item-arrow">&#x2192;</div>
      </a>

    </div>

    <div class="nav-section" style="margin-top: 4px;">
      <div class="nav-section-label">Other</div>

      <a class="nav-item" href="#">
        <div class="nav-item-title">Coming soon</div>
        <div class="nav-item-arrow">&#x2192;</div>
      </a>

    </div>

  </div>

  <div class="sidebar-footer">
    <a class="footer-link" href="mailto:ing.matteo.mi@gmail.com">email</a>
    <a class="footer-link" href="https://www.linkedin.com/in/matteo-ingram/">linkedin</a>
  </div>
</div>

<div class="stage" id="stage">
  <div class="name-wrap" id="nameBtn" role="button" tabindex="0" aria-label="Open navigation">
    <div class="name">Matteo Martin Ingram</div>
    <div class="name-hint">click to explore</div>
  </div>
</div>

<div class="year" id="year">2026</div>

<script>
const sidebar  = document.getElementById('sidebar');
const stage    = document.getElementById('stage');
const yearEl   = document.getElementById('year');
const overlay  = document.getElementById('overlay');
const nameBtn  = document.getElementById('nameBtn');
const closeBtn = document.getElementById('closeBtn');
let open = false;

function openSidebar() {
  open = true;
  sidebar.classList.add('open');
  stage.classList.add('pushed');
  yearEl.classList.add('pushed');
  overlay.classList.add('active');
}

function closeSidebar() {
  open = false;
  sidebar.classList.remove('open');
  stage.classList.remove('pushed');
  yearEl.classList.remove('pushed');
  overlay.classList.remove('active');
}

nameBtn.addEventListener('click', () => open ? closeSidebar() : openSidebar());
nameBtn.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open ? closeSidebar() : openSidebar(); }
});
closeBtn.addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);
</script>
</body>
</html>
