<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Hedge — MMI</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:    #0f0f0f;
  --ink2:   #888;
  --ink3:   #bbb;
  --border: #ececec;
  --off:    #fafafa;
  --white:  #fff;
  --red:    #c0392b;
  --green:  #27ae60;
  --blue:   #2980b9;
}

html, body {
  min-height: 100vh;
  background: var(--off);
  color: var(--ink);
  font-family: 'DM Mono', monospace;
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 40px;
  justify-content: space-between;
  z-index: 100;
}

.nav-left {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 15px;
  font-weight: 400;
  color: var(--ink2);
  text-decoration: none;
  letter-spacing: 0.02em;
  transition: color 0.15s;
}
.nav-left:hover { color: var(--ink); }

.nav-right {
  font-size: 10px;
  font-weight: 300;
  color: var(--ink3);
  letter-spacing: 0.1em;
}

/* ── PAGE ── */
.page {
  max-width: 900px;
  margin: 0 auto;
  padding: 88px 40px 80px;
}

/* ── HEADER ── */
.page-header {
  margin-bottom: 52px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 28px;
}

.page-title {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: clamp(28px, 4vw, 46px);
  font-weight: 400;
  line-height: 1.1;
  letter-spacing: 0.01em;
  color: var(--ink);
  margin-bottom: 10px;
}

.page-sub {
  font-size: 10px;
  font-weight: 300;
  color: var(--ink3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* ── SECTIONS ── */
.section {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 32px;
  margin-bottom: 20px;
}

.section-label {
  font-size: 9px;
  font-weight: 400;
  color: var(--ink3);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 22px;
}

/* ── FORM GRID ── */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px 28px;
}

.field { display: flex; flex-direction: column; gap: 7px; }

.field label {
  font-size: 10px;
  font-weight: 400;
  color: var(--ink2);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.field input,
.field select {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 400;
  color: var(--ink);
  background: var(--off);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  width: 100%;
  transition: border-color 0.15s, background 0.15s;
  appearance: none;
  -webkit-appearance: none;
}

.field input:focus,
.field select:focus {
  outline: none;
  border-color: var(--ink3);
  background: var(--white);
}

.field input::placeholder { color: var(--ink3); }

/* ── BUTTON ── */
.run-btn {
  margin-top: 24px;
  width: 100%;
  padding: 13px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink);
  background: var(--white);
  border: 1px solid var(--ink);
  border-radius: 7px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}

.run-btn:hover {
  background: var(--ink);
  color: var(--white);
}

/* ── RESULTS ── */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 28px;
}

.metric {
  background: var(--white);
  padding: 18px 20px;
}

.metric-label {
  font-size: 9px;
  font-weight: 400;
  color: var(--ink3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.metric-value {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -0.01em;
}

.metric-value.pos { color: var(--green); }
.metric-value.neg { color: var(--red); }

.metric-sub {
  font-size: 10px;
  font-weight: 300;
  color: var(--ink3);
  margin-top: 5px;
  letter-spacing: 0.04em;
}

/* ── RANGE CELLS ── */
.ranges-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 28px;
}

.range-cell {
  background: var(--white);
  padding: 16px 20px;
}

.range-cell-label {
  font-size: 9px;
  font-weight: 400;
  color: var(--ink3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.range-cell-value {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 400;
  color: var(--ink);
}

.range-cell-value.pos { color: var(--green); }
.range-cell-value.neg { color: var(--red); }

/* ── CHART ── */
.chart-wrap {
  position: relative;
  height: 300px;
  margin-bottom: 20px;
}

/* ── INSIGHT ── */
.insight {
  font-size: 11px;
  font-weight: 300;
  color: var(--ink2);
  line-height: 1.8;
  letter-spacing: 0.02em;
  padding: 16px 20px;
  border-left: 2px solid var(--border);
  background: var(--off);
  border-radius: 0 6px 6px 0;
}

.insight strong {
  font-weight: 500;
  color: var(--ink);
}

/* ── DIV LINE ── */
.div-line { height: 1px; background: var(--border); margin: 24px 0; }

/* ── FOOTER ── */
footer {
  margin-top: 60px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-name {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 15px;
  font-weight: 400;
  color: var(--ink2);
}

.footer-links { display: flex; gap: 20px; }

.footer-link {
  font-size: 10px;
  font-weight: 300;
  color: var(--ink3);
  text-decoration: none;
  letter-spacing: 0.07em;
  transition: color 0.15s;
}
.footer-link:hover { color: var(--ink); }

@media (max-width: 600px) {
  .form-grid, .metrics-row, .ranges-row { grid-template-columns: 1fr; }
  .page { padding: 80px 20px 60px; }
  nav { padding: 0 20px; }
  footer { flex-direction: column; gap: 16px; text-align: center; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-left" href="index.html">Matteo Martin Ingram</a>
  <div class="nav-right">Polymarket Hedge — V1</div>
</nav>

<div class="page">

  <div class="page-header">
    <div class="page-title">Polymarket Hedge</div>
    <div class="page-sub">Dual strike payoff analysis</div>
  </div>

  <!-- ── INPUTS ── -->
  <div class="section">
    <div class="section-label">Parameters</div>
    <div class="form-grid">

      <div class="field">
        <label>Stock Entry Price (S₀)</label>
        <input type="number" id="entryPrice" step="any" placeholder="e.g. 100">
      </div>

      <div class="field">
        <label>Position Size ($)</label>
        <input type="number" id="positionSize" step="any" placeholder="e.g. 10000">
      </div>

      <div class="field">
        <label>Stock Direction</label>
        <select id="stockDirection">
          <option value="short" selected>Short</option>
          <option value="long">Long</option>
        </select>
      </div>

      <div class="field">
        <label>Poly Direction</label>
        <select id="polyDirection">
          <option value="up">Up</option>
          <option value="down" selected>Down</option>
        </select>
      </div>

      <div class="field">
        <label>Poly Premium</label>
        <input type="number" id="premium" step="any" placeholder="e.g. 200">
      </div>

      <div class="field">
        <label>Poly Payout</label>
        <input type="number" id="payout" step="any" placeholder="e.g. 1000">
      </div>

      <div class="field">
        <label>Poly Strike Price (K)</label>
        <input type="number" id="polyStrike" step="any" placeholder="e.g. 105">
      </div>

      <div class="field">
        <label>&nbsp;</label>
        <input type="text" value="Separate from entry (S₀)" disabled style="color:var(--ink3);cursor:default;">
      </div>

    </div>
    <button class="run-btn" onclick="analyze()">Run analysis</button>
  </div>

  <!-- ── OUTPUT ── -->
  <div id="output"></div>

  <footer>
    <div class="footer-name">Matteo Martin Ingram</div>
    <div class="footer-links">
      <a class="footer-link" href="mailto:ing.matteo.mi@gmail.com">email</a>
      <a class="footer-link" href="https://www.linkedin.com/in/matteo-ingram/" target="_blank">linkedin</a>
    </div>
  </footer>

</div>

<script>
function analyze() {
  const S0        = parseFloat(document.getElementById('entryPrice').value);
  const posSz     = parseFloat(document.getElementById('positionSize').value);
  const stockDir  = document.getElementById('stockDirection').value;
  const polyDir   = document.getElementById('polyDirection').value;
  const premium   = parseFloat(document.getElementById('premium').value);
  const payout    = parseFloat(document.getElementById('payout').value);
  const K         = parseFloat(document.getElementById('polyStrike').value);

  if ([S0,posSz,premium,payout,K].some(isNaN) || S0 <= 0 || K <= 0) {
    alert('Please fill all fields with valid positive numbers.');
    return;
  }

  const shares = posSz / S0;

  function totalPL(ST) {
    const stockPL = stockDir === 'long' ? shares*(ST-S0) : -shares*(ST-S0);
    const win     = polyDir  === 'up'   ? ST > K         : ST < K;
    return stockPL + (win ? payout - premium : -premium);
  }

  const minX  = Math.max(0.01, Math.min(S0,K)*0.3);
  const maxX  = Math.max(S0,K)*2.2;
  const N     = 500;
  const step  = (maxX-minX)/N;

  const prices = [], plVals = [];
  const breakevens = [];
  let prevP = minX, prevPL = totalPL(minX);

  for (let i = 0; i <= N; i++) {
    const p  = minX + i*step;
    const pl = totalPL(p);
    prices.push(p); plVals.push(pl);
    if (i > 0 && prevPL*pl <= 0 && Math.abs(pl-prevPL) > 1e-9) {
      const b = prevP - prevPL*(p-prevP)/(pl-prevPL);
      if (b >= minX && b <= maxX) breakevens.push(b);
    }
    prevP = p; prevPL = pl;
  }

  const bes     = [...new Set(breakevens.map(x => Math.round(x*100)/100))];
  const plAtS0  = totalPL(S0);
  const plAtK   = totalPL(K);
  const maxPL   = Math.max(...plVals);
  const minPL   = Math.min(...plVals);

  const profitPrices = prices.filter((_,i) => plVals[i] > 0);
  const lossPrices   = prices.filter((_,i) => plVals[i] < 0);

  let insight = '';
  if (stockDir==='short' && polyDir==='down')
    insight = `Short stock (S₀ = ${S0}) combined with a down contract (K = ${K}). The digital pays when price falls below ${K}, amplifying the short. Above the upper breakeven the short also profits — creating two profit windows.`;
  else if (stockDir==='short' && polyDir==='up')
    insight = `Short stock (S₀ = ${S0}) with an up contract (K = ${K}). The digital pays above ${K}, partially offsetting short losses in a rally.`;
  else if (stockDir==='long' && polyDir==='up')
    insight = `Long stock (S₀ = ${S0}) with an up contract (K = ${K}). Digital pays above ${K}, stacking gains. Downside limited to premium cost.`;
  else
    insight = `Long stock (S₀ = ${S0}) with a down contract (K = ${K}). Digital pays below ${K}, hedging the long position.`;

  const sign = v => v >= 0 ? 'pos' : 'neg';
  const fmt  = v => (v >= 0 ? '+' : '') + v.toFixed(2);

  document.getElementById('output').innerHTML = `
    <div class="section">
      <div class="section-label">Results</div>

      <div class="metrics-row">
        <div class="metric">
          <div class="metric-label">P&amp;L at S₀ = ${S0}</div>
          <div class="metric-value ${sign(plAtS0)}">${fmt(plAtS0)}</div>
          <div class="metric-sub">At stock entry</div>
        </div>
        <div class="metric">
          <div class="metric-label">P&amp;L at K = ${K}</div>
          <div class="metric-value ${sign(plAtK)}">${fmt(plAtK)}</div>
          <div class="metric-sub">At poly strike</div>
        </div>
        <div class="metric">
          <div class="metric-label">Breakeven(s)</div>
          <div class="metric-value" style="font-size:${bes.length>1?'18px':'28px'}">${bes.length ? bes.map(x=>x.toFixed(2)).join(' · ') : '—'}</div>
          <div class="metric-sub">Zero P&amp;L crossing${bes.length!==1?'s':''}</div>
        </div>
      </div>

      <div class="ranges-row">
        <div class="range-cell">
          <div class="range-cell-label">Profit range</div>
          <div class="range-cell-value pos">${profitPrices.length ? profitPrices[0].toFixed(2)+' → '+profitPrices[profitPrices.length-1].toFixed(2) : '—'}</div>
        </div>
        <div class="range-cell">
          <div class="range-cell-label">Loss range</div>
          <div class="range-cell-value neg">${lossPrices.length ? lossPrices[0].toFixed(2)+' → '+lossPrices[lossPrices.length-1].toFixed(2) : '—'}</div>
        </div>
        <div class="range-cell">
          <div class="range-cell-label">Max profit</div>
          <div class="range-cell-value pos">${fmt(maxPL)}</div>
        </div>
        <div class="range-cell">
          <div class="range-cell-label">Max loss</div>
          <div class="range-cell-value neg">${fmt(minPL)}</div>
        </div>
      </div>

      <div class="div-line"></div>

      <div class="section-label">Payoff chart</div>
      <div class="chart-wrap">
        <canvas id="payoffChart"></canvas>
      </div>

      <div class="div-line"></div>

      <div class="insight">
        <strong>Insight — </strong>${insight}
        Max observed: <span style="color:var(--green)">${fmt(maxPL)}</span> &nbsp;/&nbsp; <span style="color:var(--red)">${fmt(minPL)}</span>.
      </div>
    </div>
  `;

  const existing = Chart.getChart('payoffChart');
  if (existing) existing.destroy();

  new Chart(document.getElementById('payoffChart'), {
    type: 'line',
    data: {
      labels: prices.map(p => p.toFixed(1)),
      datasets: [
        {
          label: 'P&L',
          data: plVals,
          borderColor: '#0f0f0f',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.1,
          fill: false,
        },
        {
          label: 'Breakeven',
          data: bes.map(p => ({ x: p, y: 0 })),
          type: 'scatter',
          backgroundColor: '#2980b9',
          pointRadius: 6,
          borderColor: '#fff',
          borderWidth: 1.5,
          showLine: false,
        },
        {
          label: 'Poly Strike K',
          data: [{ x: K, y: totalPL(K) }],
          type: 'scatter',
          backgroundColor: '#e67e22',
          pointRadius: 8,
          pointStyle: 'triangle',
          borderColor: '#fff',
          borderWidth: 1.5,
          showLine: false,
        },
        {
          label: 'Entry S₀',
          data: [{ x: S0, y: totalPL(S0) }],
          type: 'scatter',
          backgroundColor: '#8e44ad',
          pointRadius: 6,
          pointStyle: 'rect',
          borderColor: '#fff',
          borderWidth: 1.5,
          showLine: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: {
            font: { family: 'DM Mono', size: 10 },
            color: '#888',
            boxWidth: 10,
            padding: 16,
          }
        },
        tooltip: {
          titleFont: { family: 'DM Mono', size: 10 },
          bodyFont:  { family: 'DM Mono', size: 10 },
          callbacks: {
            label: c => {
              if (c.dataset.label === 'Breakeven') return `Breakeven: $${c.raw.x.toFixed(2)}`;
              if (c.dataset.label === 'Poly Strike K') return `K = $${c.raw.x.toFixed(2)} · P&L: $${c.raw.y.toFixed(2)}`;
              if (c.dataset.label === 'Entry S₀') return `S₀ = $${c.raw.x.toFixed(2)} · P&L: $${c.raw.y.toFixed(2)}`;
              return `P&L: $${parseFloat(c.raw).toFixed(2)} at $${c.label}`;
            }
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: 'Stock price ($)', font: { family: 'DM Mono', size: 10 }, color: '#bbb' },
          ticks: { font: { family: 'DM Mono', size: 9 }, color: '#bbb', maxTicksLimit: 8 },
          grid:  { color: '#f0f0f0' },
          border: { display: false }
        },
        y: {
          title: { display: true, text: 'Profit / Loss ($)', font: { family: 'DM Mono', size: 10 }, color: '#bbb' },
          ticks: { font: { family: 'DM Mono', size: 9 }, color: '#bbb', maxTicksLimit: 6 },
          grid:  { color: '#f0f0f0' },
          border: { display: false }
        }
      }
    }
  });
}
</script>
</body>
</html>
