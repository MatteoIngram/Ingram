<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Hedge — MMI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0f0f0f;--ink2:#888;--ink3:#bbb;--border:#ececec;--off:#fafafa;--white:#fff;--red:#c0392b;--green:#27ae60}
html,body{min-height:100vh;background:var(--off);color:var(--ink);font-family:'DM Mono',monospace}
nav{position:fixed;top:0;left:0;right:0;height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 40px;justify-content:space-between;z-index:100}
.nav-left{font-family:'EB Garamond',Georgia,serif;font-size:15px;font-weight:400;color:var(--ink2);text-decoration:none;letter-spacing:.02em;transition:color .15s}
.nav-left:hover{color:var(--ink)}
.nav-right{font-size:10px;font-weight:300;color:var(--ink3);letter-spacing:.1em}
.page{max-width:900px;margin:0 auto;padding:88px 40px 80px}
.page-header{margin-bottom:52px;border-bottom:1px solid var(--border);padding-bottom:28px}
.page-title{font-family:'EB Garamond',Georgia,serif;font-size:clamp(28px,4vw,46px);font-weight:400;line-height:1.1;letter-spacing:.01em;color:var(--ink);margin-bottom:10px}
.page-sub{font-size:10px;font-weight:300;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase}
.section{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:32px;margin-bottom:20px}
.section-label{font-size:9px;font-weight:400;color:var(--ink3);letter-spacing:.16em;text-transform:uppercase;margin-bottom:22px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px 28px}
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:10px;font-weight:400;color:var(--ink2);letter-spacing:.08em;text-transform:uppercase}
.field input,.field select{font-family:'DM Mono',monospace;font-size:14px;font-weight:400;color:var(--ink);background:var(--off);border:1px solid var(--border);border-radius:6px;padding:10px 12px;width:100%;transition:border-color .15s,background .15s;appearance:none;-webkit-appearance:none}
.field input:focus,.field select:focus{outline:none;border-color:var(--ink3);background:var(--white)}
.field input::placeholder{color:var(--ink3)}
.run-btn{margin-top:24px;width:100%;padding:13px;font-family:'DM Mono',monospace;font-size:11px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);background:var(--white);border:1px solid var(--ink);border-radius:7px;cursor:pointer;transition:background .15s,color .15s}
.run-btn:hover{background:var(--ink);color:var(--white)}
.metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:28px}
.metric{background:var(--white);padding:18px 20px}
.metric-label{font-size:9px;font-weight:400;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.metric-value{font-family:'EB Garamond',Georgia,serif;font-size:28px;font-weight:400;color:var(--ink);line-height:1;letter-spacing:-.01em}
.metric-value.pos{color:var(--green)}
.metric-value.neg{color:var(--red)}
.metric-sub{font-size:10px;font-weight:300;color:var(--ink3);margin-top:5px;letter-spacing:.04em}
.ranges-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:28px}
.range-cell{background:var(--white);padding:16px 20px}
.range-cell-label{font-size:9px;font-weight:400;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.range-cell-value{font-family:'DM Mono',monospace;font-size:13px;font-weight:400;color:var(--ink)}
.range-cell-value.pos{color:var(--green)}
.range-cell-value.neg{color:var(--red)}
.chart-wrap{position:relative;height:300px;margin-bottom:20px}
.insight{font-size:11px;font-weight:300;color:var(--ink2);line-height:1.8;letter-spacing:.02em;padding:16px 20px;border-left:2px solid var(--border);background:var(--off);border-radius:0 6px 6px 0}
.insight strong{font-weight:500;color:var(--ink)}
.div-line{height:1px;background:var(--border);margin:24px 0}
footer{margin-top:60px;padding-top:28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.footer-name{font-family:'EB Garamond',Georgia,serif;font-size:15px;font-weight:400;color:var(--ink2)}
.footer-links{display:flex;gap:20px}
.footer-link{font-size:10px;font-weight:300;color:var(--ink3);text-decoration:none;letter-spacing:.07em;transition:color .15s}
.footer-link:hover{color:var(--ink)}
@media(max-width:600px){.form-grid,.metrics-row,.ranges-row{grid-template-columns:1fr}.page{padding:80px 20px 60px}nav{padding:0 20px}footer{flex-direction:column;gap:16px;text-align:center}}
</style>
</head>
<body>

<nav>
  <a class="nav-left" href="index.html">Matteo Martin Ingram</a>
  <div class="nav-right">Polymarket Hedge — V1</div>
</nav>

<div class="page">

  <div class="page-header">
    <div class="page-title">Polymarket Hedge</div>
    <div class="page-sub">Dual strike payoff analysis</div>
  </div>

  <div class="section">
    <div class="section-label">Parameters</div>
    <div class="form-grid">
      <div class="field">
        <label>Stock Entry Price (S&#8320;)</label>
        <input type="number" id="entryPrice" step="any" placeholder="e.g. 100">
      </div>
      <div class="field">
        <label>Position Size ($)</label>
        <input type="number" id="positionSize" step="any" placeholder="e.g. 10000">
      </div>
      <div class="field">
        <label>Stock Direction</label>
        <select id="stockDirection">
          <option value="short" selected>Short</option>
          <option value="long">Long</option>
        </select>
      </div>
      <div class="field">
        <label>Poly Direction</label>
        <select id="polyDirection">
          <option value="up">Up</option>
          <option value="down" selected>Down</option>
        </select>
      </div>
      <div class="field">
        <label>Poly Premium</label>
        <input type="number" id="premium" step="any" placeholder="e.g. 200">
      </div>
      <div class="field">
        <label>Poly Payout</label>
        <input type="number" id="payout" step="any" placeholder="e.g. 1000">
      </div>
      <div class="field">
        <label>Poly Strike Price (K)</label>
        <input type="number" id="polyStrike" step="any" placeholder="e.g. 105">
      </div>
      <div class="field">
        <label>&nbsp;</label>
        <input type="text" value="Separate from entry (S&#8320;)" disabled style="color:var(--ink3);cursor:default;">
      </div>
    </div>
    <button class="run-btn" id="runBtn">Run analysis</button>
  </div>

  <div id="output"></div>

  <footer>
    <div class="footer-name">Matteo Martin Ingram</div>
    <div class="footer-links">
      <a class="footer-link" href="mailto:ing.matteo.mi@gmail.com">email</a>
      <a class="footer-link" href="https://www.linkedin.com/in/matteo-ingram/" target="_blank">linkedin</a>
    </div>
  </footer>

</div>

<script>
document.getElementById('runBtn').addEventListener('click', analyze);

function analyze() {
  var S0       = parseFloat(document.getElementById('entryPrice').value);
  var posSz    = parseFloat(document.getElementById('positionSize').value);
  var stockDir = document.getElementById('stockDirection').value;
  var polyDir  = document.getElementById('polyDirection').value;
  var premium  = parseFloat(document.getElementById('premium').value);
  var payout   = parseFloat(document.getElementById('payout').value);
  var K        = parseFloat(document.getElementById('polyStrike').value);

  if ([S0,posSz,premium,payout,K].some(isNaN) || S0 <= 0 || K <= 0) {
    alert('Please fill all fields with valid positive numbers.');
    return;
  }

  var shares = posSz / S0;

  function totalPL(ST) {
    var stockPL = stockDir === 'long' ? shares*(ST-S0) : -shares*(ST-S0);
    var win = polyDir === 'up' ? ST > K : ST < K;
    return stockPL + (win ? payout - premium : -premium);
  }

  var minX = Math.max(0.01, Math.min(S0,K)*0.3);
  var maxX = Math.max(S0,K)*2.2;
  var N = 500;
  var step = (maxX-minX)/N;

  var prices = [], plVals = [], breakevens = [];
  var prevP = minX, prevPL = totalPL(minX);

  for (var i = 0; i <= N; i++) {
    var p = minX + i*step;
    var pl = totalPL(p);
    prices.push(p);
    plVals.push(pl);
    if (i > 0 && prevPL*pl <= 0 && Math.abs(pl-prevPL) > 1e-9) {
      var b = prevP - prevPL*(p-prevP)/(pl-prevPL);
      if (b >= minX && b <= maxX) breakevens.push(b);
    }
    prevP = p;
    prevPL = pl;
  }

  var bes = breakevens
    .map(function(x){ return Math.round(x*100)/100; })
    .filter(function(v,i,a){ return a.indexOf(v)===i; });

  var plAtS0 = totalPL(S0);
  var plAtK  = totalPL(K);
  var maxPL  = Math.max.apply(null, plVals);
  var minPL  = Math.min.apply(null, plVals);

  var profitPrices = prices.filter(function(_,i){ return plVals[i] > 0; });
  var lossPrices   = prices.filter(function(_,i){ return plVals[i] < 0; });

  var insight = '';
  if (stockDir==='short' && polyDir==='down')
    insight = 'Short stock (S\u2080 = '+S0+') combined with a down contract (K = '+K+'). The digital pays when price falls below '+K+', amplifying the short. Above the upper breakeven the short also profits \u2014 creating two profit windows.';
  else if (stockDir==='short' && polyDir==='up')
    insight = 'Short stock (S\u2080 = '+S0+') with an up contract (K = '+K+'). The digital pays above '+K+', partially offsetting short losses in a rally.';
  else if (stockDir==='long' && polyDir==='up')
    insight = 'Long stock (S\u2080 = '+S0+') with an up contract (K = '+K+'). Digital pays above '+K+', stacking gains. Downside limited to premium cost.';
  else
    insight = 'Long stock (S\u2080 = '+S0+') with a down contract (K = '+K+'). Digital pays below '+K+', hedging the long position.';

  function sign(v){ return v >= 0 ? 'pos' : 'neg'; }
  function fmt(v){ return (v >= 0 ? '+' : '') + v.toFixed(2); }

  var profitRange = profitPrices.length
    ? profitPrices[0].toFixed(2)+' \u2192 '+profitPrices[profitPrices.length-1].toFixed(2)
    : '\u2014';
  var lossRange = lossPrices.length
    ? lossPrices[0].toFixed(2)+' \u2192 '+lossPrices[lossPrices.length-1].toFixed(2)
    : '\u2014';
  var besStr = bes.length ? bes.map(function(x){ return x.toFixed(2); }).join(' \u00b7 ') : '\u2014';
  var besFontSize = bes.length > 1 ? '18px' : '28px';

  document.getElementById('output').innerHTML =
    '<div class="section">' +
      '<div class="section-label">Results</div>' +
      '<div class="metrics-row">' +
        '<div class="metric">' +
          '<div class="metric-label">P&amp;L at S\u2080 = '+S0+'</div>' +
          '<div class="metric-value '+sign(plAtS0)+'">'+fmt(plAtS0)+'</div>' +
          '<div class="metric-sub">At stock entry</div>' +
        '</div>' +
        '<div class="metric">' +
          '<div class="metric-label">P&amp;L at K = '+K+'</div>' +
          '<div class="metric-value '+sign(plAtK)+'">'+fmt(plAtK)+'</div>' +
          '<div class="metric-sub">At poly strike</div>' +
        '</div>' +
        '<div class="metric">' +
          '<div class="metric-label">Breakeven(s)</div>' +
          '<div class="metric-value" style="font-size:'+besFontSize+'">'+besStr+'</div>' +
          '<div class="metric-sub">Zero P&amp;L crossing'+(bes.length!==1?'s':'')+'</div>' +
        '</div>' +
      '</div>' +
      '<div class="ranges-row">' +
        '<div class="range-cell">' +
          '<div class="range-cell-label">Profit range</div>' +
          '<div class="range-cell-value pos">'+profitRange+'</div>' +
        '</div>' +
        '<div class="range-cell">' +
          '<div class="range-cell-label">Loss range</div>' +
          '<div class="range-cell-value neg">'+lossRange+'</div>' +
        '</div>' +
        '<div class="range-cell">' +
          '<div class="range-cell-label">Max profit</div>' +
          '<div class="range-cell-value pos">'+fmt(maxPL)+'</div>' +
        '</div>' +
        '<div class="range-cell">' +
          '<div class="range-cell-label">Max loss</div>' +
          '<div class="range-cell-value neg">'+fmt(minPL)+'</div>' +
        '</div>' +
      '</div>' +
      '<div class="div-line"></div>' +
      '<div class="section-label">Payoff chart</div>' +
      '<div class="chart-wrap"><canvas id="payoffChart"></canvas></div>' +
      '<div class="div-line"></div>' +
      '<div class="insight">' +
        '<strong>Insight \u2014 </strong>'+insight+
        ' Max observed: <span style="color:var(--green)">'+fmt(maxPL)+'</span>' +
        ' &nbsp;/&nbsp; <span style="color:var(--red)">'+fmt(minPL)+'</span>.' +
      '</div>' +
    '</div>';

  var existing = Chart.getChart('payoffChart');
  if (existing) existing.destroy();

  new Chart(document.getElementById('payoffChart'), {
    type: 'line',
    data: {
      labels: prices.map(function(p){ return p.toFixed(1); }),
      datasets: [
        {
          label: 'P&L',
          data: plVals,
          borderColor: '#0f0f0f',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.1,
          fill: false
        },
        {
          label: 'Breakeven',
          data: bes.map(function(p){ return { x: p, y: 0 }; }),
          type: 'scatter',
          backgroundColor: '#2980b9',
          pointRadius: 6,
          borderColor: '#fff',
          borderWidth: 1.5,
          showLine: false
        },
        {
          label: 'Poly Strike K',
          data: [{ x: K, y: totalPL(K) }],
          type: 'scatter',
          backgroundColor: '#e67e22',
          pointRadius: 8,
          pointStyle: 'triangle',
          borderColor: '#fff',
          borderWidth: 1.5,
          showLine: false
        },
        {
          label: 'Entry S\u2080',
          data: [{ x: S0, y: totalPL(S0) }],
          type: 'scatter',
          backgroundColor: '#8e44ad',
          pointRadius: 6,
          pointStyle: 'rect',
          borderColor: '#fff',
          borderWidth: 1.5,
          showLine: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: {
            font: { family: 'DM Mono', size: 10 },
            color: '#888',
            boxWidth: 10,
            padding: 16
          }
        },
        tooltip: {
          titleFont: { family: 'DM Mono', size: 10 },
          bodyFont:  { family: 'DM Mono', size: 10 },
          callbacks: {
            label: function(c) {
              if (c.dataset.label === 'Breakeven')     return 'Breakeven: $'+c.raw.x.toFixed(2);
              if (c.dataset.label === 'Poly Strike K') return 'K = $'+c.raw.x.toFixed(2)+' \u00b7 P&L: $'+c.raw.y.toFixed(2);
              if (c.dataset.label === 'Entry S\u2080') return 'S\u2080 = $'+c.raw.x.toFixed(2)+' \u00b7 P&L: $'+c.raw.y.toFixed(2);
              return 'P&L: $'+parseFloat(c.raw).toFixed(2)+' at $'+c.label;
            }
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: 'Stock price ($)', font: { family: 'DM Mono', size: 10 }, color: '#bbb' },
          ticks: { font: { family: 'DM Mono', size: 9 }, color: '#bbb', maxTicksLimit: 8 },
          grid:  { color: '#f0f0f0' },
          border: { display: false }
        },
        y: {
          title: { display: true, text: 'Profit / Loss ($)', font: { family: 'DM Mono', size: 10 }, color: '#bbb' },
          ticks: { font: { family: 'DM Mono', size: 9 }, color: '#bbb', maxTicksLimit: 6 },
          grid:  { color: '#f0f0f0' },
          border: { display: false }
        }
      }
    }
  });
}
</script>
</body>
</html>
